version: "3.10"

services:
  web:
    build:
      context: .
      dockerfile: ./docker/tests/Dockerfile
    container_name: backend_theater_test
    env_file:
      - .env.test
    command: >
      sh -c "
      echo '=== ЗАПУСК ТЕСТІВ ===' &&
      pytest -c /usr/src/config/pytest.ini -m e2e --maxfail=5 -vvs --tb=long
      "
    environment:
      ENVIRONMENT: testing
      PYTHONPATH: /usr/src/app
    depends_on:
      mailhog:
        condition: service_started
      minio:
        condition: service_healthy
      redis_test:
        condition: service_healthy
      minio_mc:
        condition: service_completed_successfully
    volumes:
      - ./src:/usr/src/app/src
    networks:
      - theater_network_test

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog_theater_test
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - theater_network_test

  minio:
    image: minio/minio:latest
    container_name: minio_theater_test
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data_test:/data
    networks:
      - theater_network_test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio_mc:
    build:
      context: .
      dockerfile: ./docker/minio_mc/Dockerfile
    container_name: minio_mc_theater_test
    command: [ "/bin/sh", "-c", "/commands/setup_minio.sh" ]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_STORAGE: ${MINIO_STORAGE}
    networks:
      - theater_network_test

  redis_test:
    image: redis:7-alpine
    container_name: redis_theater_test
    ports:
      - "6380:6379"
    networks:
      - theater_network_test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  minio_data_test:
    driver: local

networks:
  theater_network_test:
    driver: bridge
